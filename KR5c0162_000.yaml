body:
  text: 肝藏春王肝屬東方木爲青帝神形如青龍象如懸瓠肝者榦也狀如枝榦故謂之肝重四斤四兩在心下有七葉左三葉右四葉肝爲心母爲腎子肝下有三魂名爽靈胎光幽精夜卧及平旦叩齒三十六通呼肝神及三魂神也目爲之宫左目爲甲象日屬陽右目爲乙象月屬陰肝放液爲泪腎邪入肝則多泪膽爲之腑膽合於肝在肝短葉下黄庭經云肝氣鬱勃清且長羅列六腑生三光心精意專内不傾上合三焦下玉漿其聲角其性仁其味酸其臭膻心邪入肝則惡膻物其蟲鱗凡有鱗之類皆屬東方也肝神好行仁惠傷閔蓋發於肝也肝神喜悦病不生肝聞悲傷則有泪泪出於肝也春之三月木王天地氣生萬物榮茂欲安其神者當澤被群芻恩霑庶類無竭川澤無漉陂池以安萌芽以止傷殺則合乎太清以順天地化生之氣夜卧早超而合乎道若逆之則毛骨不榮金氣相克衆疾生矣有疾而難治爲春夏之患耳肝之状其色青其象肝神名龍烟字含明如懸匏其神如龍肝合於腠上主於目肝盛目赤又主於筋筋急者肝虧也皮枯者肝熱也肌骨斑點者肝風也面色青者肝盛也好食酸味者肝不足也毛髮枯者肝傷也肺邪入肝則多笑手足多汗肝無疾也肝氣逆則頭痛耳鳴惛惛多睡小腹微痛視物不明飛蠅上下凡丈夫五十已上腎氣衰减不應於肝所以眼暗將攝若乖則眼赤目癢肝被陰邪侵則夢見林園竹木或見著青或在水邊見龍蛇禽獸奔走趁驚怕可用噓以去之平日叩齒九通以鼻引清氣輕噓三十六遍以治肝之一切煩熱春忌及沐浴修齋日正月勿食生葱蓼子蒜狸豹等肉食韮補益臟腑一日修續壽齋四日勿殺生七日是三會日修延神齋八日沐浴吉二月勿食蓼子鷄子兔肉八日修芳春齋九日勿食魚上旬卯日沐浴吉十五日修太上老君生日齋三月勿食葵及諸畜脾三日修盪邪齋勿食一切五藏及百草心六日沐浴吉凡春行道路勿飲深泉流水候雷聲而别寢春七十二日省酸味增甘味以助脾神肝有病即目赤眼中生弩肉暈膜視物不明宜服外麻散子升麻寅苓各八分山栀黄瓜各七分决明子車前子乾薑地膚子各十分龍膽充蔚子各五分右熬搗爲散空心飲調三錢匕服黄帝治男子五勞七傷陰衰消縮囊下生瘡腰背疼痛不得俛仰筋脉痹冷或時熱癢或時浮腫難以行步因風泪出遠視茫茫咳逆上氣身體痿黄氣衝臍痛膀胱急攣小便出血莖痛核痛或復淋瀝污衣赤黄或夢惧驚口乾舌强皆犯七傷洎成勞傷此藥主之極驗神妙茯苓若食不消三分加一分菖蒲若患耳三分加一分䒷蔞若熱渴加一分山茱萸若身癢濕加一分兔絲子若陰萎加一分牛膝若腰痛加一分細辛若目視茫茫加一分續斷若有瘡加一分巴戟天若陰萎加一分防風若風邪加一分山藥若陰濕癢加一分天雄若風癢加一分蛇牀子若少氣加一分柏子仁氣力不足加一分遠志驚恐不安加一分石斛身皮痛加一分杜仲若腸絶痛加一分蓰蓉若陰痿加一分右件一十八味各四分熬搗爲末煉蜜丸如梧桐子大先服食三丸少加爲度亦可作散粥和方寸匕日三服七日知效十日愈三十日體氣平復長服令人不老而少心藏夏王心屬南方火爲赤帝神形如朱雀象如倒懸芙蓉心者纖也所納纖微無不貫注變水爲血重十二兩中有七孔三毛上智之人心穴通明心有七孔中智之人心穴通氣五孔下智之人氣明俱不通心乃無孔無智慧而多狡詐心爲肝子爲脾母舌爲之宫闕竅通耳左耳爲丙右耳爲丁於液爲汗腎邪入心則多汗其味苦人之傷恨自知苦皆發於心也小腸爲心之府與心合黄庭經云心部之宫蓮含花下有童子丹元家主適寒熱榮衛和丹錦緋裳披玉羅其聲徵其臭焦人有不暢之事多云心佳蓋天使然也其性禮其情樂其蟲羽凡有羽之類皆屬南方也其神躁而無准人之暴急乃發於心也夏之三月火王萬物化實欲安其神者則含忠履孝輔義安仁定其火息其熾澄其心和其神止聲色薄滋味可以居高明可以遠眺望而後合乎中和以順天地之氣早卧早起無厭於日順於正陽以消暑氣逆之則腎藏爭分水火相克也心之狀其心神名丹元字守靈色赤其象如蓮華其神如朱雀心合小腸主其血脉主於舌舌不知味心虧也血擁者心驚也多忘者神離心也多悲者心傷也憂重語者心亂也面色青黑者心冰也好食苦者心不足也容色赤者心無疾也心有病則口乾舌强喉中痛口中生瘡心合於小腸主血脉亦主於舌故人之中風者多心舌澁王於心也心有疾則寒不時魂神不安小便多赤唇口色變氣力不足言笑不時夢見鑪火冶之物赤衣及裸形人見血光及狼大相逐忽身居危險見兵甲之類用呵以治之平旦端坐叩齒九通以鼻引清氣輕呵三十六遍治心之勞多則損夏忌及沐浴修齋日四月食蓴菜和鯽魚作羹開冑口補益四日沐浴吉八日修啓夏齋勿伐一切草木勿食鱓魚及蒜五月勿食韮宜食大麥杏藿皆益减鹹味以安心一日沐浴吉五日修續命齋勿食生菜夏至前後三日各别寢是月陰陽爭血氣散勿見血污之物夏至後勿食烏獐肉及羊脚六月六日修清暑齋勿食葵忌起土九日沐浴吉三伏日服腎瀝湯夏七十二日省苦味增辛味以助肺氣心有病即夢見丹爐炎火之類健忘多驚宜服五參丸方玄參丹參苦參秦艽各七分沙參人參乾薑各五分右熬搗爲散煉蜜爲丸如梧桐子大食上煎水下三十丸補腎氣腎瀝湯丸羊腎一個去脂膜猪腎亦得茯苓芍藥玄參生薑地黄各四銖人參甘草澤瀉五味子防風蒼芎當歸黄耆各三分桂二銖地骨皮磁石各五銖右搗作煮散先用腎一個作四五片以米一合姜一塊葱白一莖以水三碗煎取汁兩碗去腎米下藥煎取一盞半分作兩服空心服後以米腎煮粥食之黄帝曰夏三月服何藥女曰以補腎茯苓丸能治男子内虚下能飲食忽忽健忘悲憂不樂喜怒無限身肢浮腫小便赤黄精淋瀝痛絞膀胱冷疼口渴飲水心腹脹滿皆犯七傷宜餌此方茯苓食不消加一倍杜仲腰痛加一倍附子有風加一分山茱萸濕癢三分加一分牡丹皮腹中游風三分加一澤瀉水氣三分加一分桂顔色不足三分加一分山藥頭風加一倍乾地黄秋冬加半細辛目視茫茫三分加一分石斛陰濕癢三分加一分蓯蓉體痿黄加一倍生薑四兩身體疼加一倍右一十三味除桂外餘並一一熬搗爲末煉蜜丸如梧桐子大先服食七丸日再服禁房事及冷猪魚等肺藏秋王肺屬西方金爲白帝神形如白獸象如懸磬爲五藏之華蓋肺者教也言其氣㪍鬱重三斤三兩六葉兩耳共八葉肺爲脾子爲腎母肺下有七魄如嬰兒名屍狗伏矢雀陰吞賊非毒除穢臭肺夜卧時及平旦叩齒三十六通呼肺神名及七魄名以安五藏神鼻爲之宫左孔爲庚右孔爲辛在氣爲咳在液爲涕上通氣至腦户下通氣至脾中是以諸氣屬肺久卧傷肺肺爲呼吸之根源爲傳送之宫闕腎邪入肺則多涕大腸爲肺之府與肺合其榮毛髮也枯落者肺衰也黄庭經云肺部之宫似華蓋下有童子坐玉闕七元之子主調氣外應中嶽鼻齊位其聲商其味辛其臭腥心邪入肺則惡腥物其性義其情怒其津唾肺勞則多唾秋之三月金王主殺萬物枯損欲安其魄而存其形者當含仁育物施恩歛容陰陽分形萬物收殺雀卧鷄起待秋分定後斬殺必當無留有罪乃順陰氣所漡而長肺之剛順之則邪氣不侵逆之則五臟乖矣肺之狀其肺神名皓華字虚成色白其象懸磬其神如白獸肺合大腸外形於鼻肺有風則鼻塞面色枯者肺乾也鼻癢者肺有蟲也多怖者魄離肺也身上生黑白點者肺微也多聲氣者肺强也不耐寒者肺敗也好食辛者肺不足也大腸秘者肺壅也顔色鮮白者肺無病也肺有疾即多嗽上氣面浮腫多睡面生瘡面生黄白鼻寒腦疼胸背滿痛四肢煩悶皮上癢喉中噎夢見繒帛金玉美女自身甲衣見幡花雲鶴日月貴人可用咽以去之平旦叩齒九通微以鼻引清氣輕呬三十六遍以去肺之熱並一切邪氣過多亦損秋忌及沐浴修齋日七月勿食薑生蜜五日沐浴吉七日是三會日修迎秋齋八月一日修逐邪齋四日切忌市鞋履附足之物勿食鷄肉二十一日沐浴吉九月九日勿起動牀席修延算齋秋七十二日省食辛味增酸味以助肝臟起居法髮欲多梳齒欲多叩津欲常嚥氣欲常清脚欲强行手欲在面耳欲常按眼欲數摩所謂子欲不死修崑崙之法也肺有病即皮膚生瘡及疥癆上氣咳嗽涕唾稠粘宜服排風散子人參丹參各分防風天雄炮羌活秦艽山茱萸各八分沙參五分虎骨炙各十分山藥十分天麻十二分右一十一味熬搗爲散食上飲汁調五錢七服丸亦得黄帝曰秋三月如何女曰以補腎茯苓丸主腎虚冷五臟内傷風寒虚冷所苦令人身肢濕癢足行失度不自省覺飲食失味目視茫茫遍身拘急腰脊疼痛不能飲食日日羸瘦心喟咳逆上氣轉側不得起則須人扶策針灸治療小折或乘馬觸風不自將護飲食不節用力過度或口乾燋流涎自出或復惡夢精便自出尿血滴瀝陰下濕癢或如驚悸小腹偏急四肢酸疼氣息噓吸身肢浮腫衝人胸脅遇醫不識妄欲治之此方主之茯苓防風白术細辛山藥澤瀉附子紫菀獨活芍藥丹參苦參桂心乾薑牛膝山茱萸黄耆各三兩右熬搗爲散煉蜜丸如梧桐子大先食七丸日再服腎藏冬王腎藏屬北方水爲黑帝神形如鹿兩頭象圓石腎之分也主分水氣灌注一身如樹之有根有左右腎亦謂之命門生氣之府死氣之廬守之則存用之則竭重一斤一兩對臍附腰脊腎爲肝母爲肺子耳爲之宫天之生我流氣而變謂之精精氣往來謂之神神者腎之藏其情智左腎爲壬右腎爲癸在氣爲吹在液爲唾在形爲骨乆立傷骨乃損腎也腎合乎骨應在齒齒痛者腎傷也經於上焦榮於中焦衛於下焦腎邪自入則多唾膀胱爲之府其榮髮也黄庭經云腎部之宫玄闕圓中有童子名上玄主諸六府九液源外應兩耳百液津其聲羽其味醎其臭腐心邪入腎則惡腐物其蟲介凡有甲之類皆屬於水故曰介也冬之三月乾坤氣閉萬物伏藏且冬至之日陰陽爭諸生蕩君子齋戒處必掩身節嗜慾止聲色以待陰陽之所定昏卧寅起以順日光無競陰陽氣然後全其生合乎太清順乎陰陽逆之則陰氣内傷腎藏虚亂也夜卧叩齒及平旦三十六通呼神名以安水藏也腎之狀其色腎神名玄冥黑其象如圓石其神如白鹿兩頭腎合於骨上主於齒齒痛者腎傷也又主於耳耳聾者腎虚也骨痛者腎虧也齒多齟者腎寒也齒𪙑者腎風也耳痛腎壅也多欠者腎邪也腰不伸者腎冰也面色黄者腎衰也腎邪自入則多呻吟容色紫光者腎無病也腎有病腰膝連膀胱痛冷小便餘瀝面色黑而齒焦體重喘咳盜汗耳鳴隔氣食不下夢見入暗處見婦人僧尼龜鱉馳馬槍旗自身著甲共往同行或汎舟或走馬可用吹以去之平旦叩齒九通以鼻引清氣輕吹三十六遍以去腎之一切邪氣過多亦損冬忌及沐浴修齋日十月一日沐浴吉修成福齋五日修三會齋勿行責罰十一日勿沐浴仙家大忌日十一月修啓福齋十六日沐浴吉勿食葵十二月勿食鱉牛肉臘日修百福齋十五日沐浴吉二十八日修迎新齋至晦日沐浴焚香悔過思善冬十二月省碱味增苦味以助心臟腎有病即多小便腰胯疼痛夢與鬼交宜服八味丸方茯苓澤瀉牡丹皮各三分桂心附子各二分生乾地黄八分山茱萸山藥各四分右熬搗爲散煉蜜丸如梧桐子大每空心酒下三十丸忌生蘿蔔黄帝曰冬三月宜以如何女曰以護命茯苓丸主男子五勞七傷兩目茫茫得風泪岀頭風項强不得迴轉心腹脹滿上連胸脅下引腰背表裏徹痛喘息不得飲食咳逆面目痿黄小便淋瀝陰痿不起臨事不興足腫腹痛五心煩熱身背浮腫盜汗流出四肢拘攣或緩或急夢寤驚恐呼吸短氣口乾舌燥狀如消渴急急喜怒悲愁嗚咽此方主之茯苓山藥肉桂生山茱萸巴戟乾薑白术牛膝兔絲子各一兩細辛防風澤瀉柏子仁牡丹皮各半兩附子一兩半右件藥並熬搗爲散煉蜜爲丸如梧桐子大先食服七丸日再服脾藏王四季脾臟屬中央土王四季爲黄帝神形如鳳凰坤之氣土之精象如覆盆脾者裨也裨助冑氣在心下三寸重一斤三兩闊三寸長五寸脾爲心子爲肺母外通眉闕能制謀意辯皆脾也口爲之宫其神多嫉如蓋起於脾也脾無定形主土陰也如亦無准婦人多妒乃受陰氣也若食熟軟之物則全身之妙道也脾如磨之轉化食食不消是脾不轉也堅硬之物乃難化也若食訖便卧脾則側側則不化食乃爲宿食之患若勞形之人猶可若年過五十或閑樂之人故自掇其患也脾氣通和則口知五味脾氣有病則唇黑口乾不思食不知五味黄庭經云脾長一尺掩太倉中部老君治明堂其聲宫其性信其味甘其臭香心邪入脾則不聞香氣其蟲裸主於吞脾生於中宫脾居左脇主於唇口口爲戊舌爲己合於肉榮於唇藏不調即傷於脾脾不調則傷質質神俱損則傷人之中風口涎舌硬乃爲脾氣受邪也當四季月末十八日少思屏慮屈己濟人不爲利爭不爲陰賊不與物競不以自强恬和清虛順神之德而後全其生逆之則脾腎受邪土木相克也脾之狀其脾神名常在字魂庭色黄其狀如覆盆其神如鳳脾與冑合爲府居左脅寄二宫六氣肋王於四季轉化其生而入於熟也食不消者脾不轉也多食者脾虛也不顧食者脾中有不化食也食不下者脾塞也面無顔色者脾虛之也好食甘物者脾不足也多惑者脾識不安也有風及肺疾者食多乃脾虛也肌肉鮮白滑者脾無疾也脾聲主宫宫爲五音之長律應黄鍾脾聞樂則磨脾是元氣之本宫居太阿色黄體重土王六月亦寄四季有身沉力弱不欲食身上習習如遊風心中自悶而色痿黄夢見動土或在野壙及見道士身居城壘童兒共行可用呼以去之平旦叩齒六通微以鼻引清氣呼三十遍以去脾之壅滯過多亦損六氣法上熱呵心火眼昏噓自治肺寒咽即效耳病著心吹脾冑常呼吸三焦滯處嘻山中無藥物見此是良醫嘘呵呬吹呼嘻此六字去五藏諸疾比者方書亦多乖錯今尋討修養經書究窮義理此六字定矣若臟腑有疾但澄心定意想氣存思微微噓呵邪氣自然消散所言止三十遍過多亦損者此大約言之亦無准定稍覺舌關清冷則疾已過矣脾有病即氣滿衝心四肢虚腫宜服訶梨勒丸方訶梨勒皮七分山藥牡丹皮澤瀉山茱萸茯苓蓽撥芎藭各八分乾薑五分右熬搗爲末煉蜜丸如梧桐子大空心棗湯下三十丸膽臓膽者金之精水之氣其色青其神形如龜蛇象如懸瓠附著肝短葉下膽者敢也言人贍氣果敢重三兩三銖爲肝之腑若據膽則不在五臟之數歸於六腑縁膽下亦受水氣與坎宫同道又不可用六腑故别立膽臟人之勇决者蓋發於膽臟也合於膀胱亦主於毛髮黄庭經云主諸氣力攝虎兵外應眼瞳鼻柱間腦髮相扶與俱鮮膽部與五臟相類也且膽寄於坎宫使人慕善知邪絶奸止佞欲行直道膽主於金金主於殺故多勇殺之氣萬物殺者則悲故人悲者金生於水是以目有汨也心主火膽屬水火得水而滅水得火而煎陰陽交爭水勝於火目有泪也泪出於膽膽水主目瞳受木精二合男子五十目暗者腎氣衰膽精减而可補其腎長於肝欲安其神當息忿爭行仁輔義後乃全其生也膽之狀其膽神名龍耀字威明色青其象如懸瓠其神如龜蛇膽合於膀胱上主毛髮髮枯者膽損也膽有病大息口乾心中澹澹似被人捕逐者傾也膽實則傷熱熱則精神不守起卧無定膽虚則傷寒寒則或畏頭眩不敢獨卧爪甲乾者膽虧也無懼者膽洪實也無故泪出者膽虛也好食苦物者膽不足也髮燥者膽風也毛燋者膽熱也顔色青光者膽無病也夢見與人鬥爭鬼交者膽衰也膽有病用嘻以去之平旦叩齒九通以鼻引清氣輕嘻三十遍以去膽之病過多則損也三尸名彭居彭質彭矯每夜呼其名七遍卓然虚净朗然不寢尸亦潜形而遊無得再宅於人身也又能以身諭國心神自然王也經曰候王能守之萬物將自化則三尸其如予何是以身安而家國可保心定而性命可全也若滛於酒色嗜於腥葷乃千變萬化隨欲而歸諸患自生乃於道情而疏矣後序人稟陰陽之氣以成四大之形一身之中一國之象胸脇位同宫室四肢亦類郊坰神猶君也血猶臣也氣猶百姓也君能化及百姓而天下晏然身能血氣調和則四肢宣暢是以聖人治未病之身寳不泯之壽任情舒卷屈迹隨時恬淡煉神舉措畏慎爲本也經曰人不畏威大威至矣攝生若無畏則心亂而難理也形躁而不寧神散而氣昏志蕩而意逸老子曰善攝生者陸行不遇兕虎入軍不被甲兵乃喻畏慎也又云五音令人耳聾五味令人口爽宜在恬淡也攝生之法亦甚多途則有焚香開經步虛躡斗危冠短褐茹柏餐松煉汞燒丹草木丸散千岐萬路不可遍窮殊途同歸百慮一致若丹懇乆著虔誠歲深眞君可知爲之潜運乎書曰天監孔明福善禍淫也是以覆載長存聖賢不滅生者天地之大德也死者天地之荼毒也所以拂塵衣去荼毒靜五臟運三元開黄庭之妙經覽紫房之秘訣然後能存能亡能晦能光出化人之表入太漠之鄉無心而朗鑒無翼而翱翔嬉明霞之館讌碧雲之堂長生可冀也經云老子修身千二百歲吾形未嘗衰又云神將守形乃可長生長生之道非賢不傳輕泄者獲戾乎天官信聽者記名於仙籍殃慶逮於九祖昇沉止於一形豈使世之愚凡悉聞悉見自羲軒已來廣成赤松令威安期長生之法曉然何迷而難返亦有混沌自然體合變化智周萬物道亞三清即高玄皇人之流也又有功成累劫德被塵沙神化無方飛騰自在即杜冲尹軌是也山居養氣無欲無爲守道守精心澄碧落即許由巢父是也遠則名書竹帛近即所在傳聞愚昧者如瞽如聾智識者且榮且貴陶隱居之書史滿腹畢而何有長齋腹空畢而何歸奇功絶代畢而何用乾象通神畢而何知老子云金玉滿堂莫之能守富貴而驕自遺其咎何不分靈臺之毫末入虛無之大門天地壞而我全萬象塵而己在積善餘慶保合大和積惡滅身而自傷何悔斯乃道不負人人能負道也聖賢留教豈可輕耶且身居浮世萬累勞華不必絶粒居山頓捨塵俗但能順時攝養漸减驕奢五味五聲勿眈勿嗜知其恬淡自然得長生之妙道也天主陽而動地主陰而靜天動也而北辰不移地靜也而東流不息故靜者天之心也動者地之氣也心靜氣動則道無不成也疾無由生矣學道者欲得廣行陰德慈心救人重道輕財不吝金玉救人窮乏謂之福田也默然養氣恬和冲神以善以謙勿欺勿詐少思少語少慾少愁勿信妖訛勿殺生命勿行陰賊勿嗜五辛勿與人傳衣巾勿與人爭曲直勿向北穢污勿乆視三光六甲日勿食鱗蟲晦朔日思修善事甲子庚申日别室靜坐寢卧處不欲虚堂高敞匪唯風霧難防亦令魂魄恍惚卧不欲仰枕不欲高寢處不欲停燈夜行須鳴天鼓八節日勿行威令秋分日尤須齋心神人贊云子欲昇天慎秋分事無大小皆上聞以罪求仙誠甚難知此學道爲心寒若眠夢不安心中驚悸此是七魄欲散五神執爭疾禍將侵必須慎護曉夕端坐叩齒三十六遍咒曰九天上帝四門八靈七房三玄三素九精太一桃康上詣三清請吿帝君攝命黄寧速召七魄校實神庭若有不祥七尸鬼兵但呼雙眞流燭煉形太微大神斬伐邪精三神和柔血尸沉零神歸絶宅觸向利貞使我神仙永保劫齡神農忌慎法黍米和葵同食作癥癖疾大豆與猪肉同食作壅氣疾青豆與鮓及鯉魚同食成瘦疾經夏曝中乾脯令發蟲疾蕎麥麵與猪肉同食成惡疾瘡兼動風赤小豆多食令人枯瘦甜粥與蒼耳同食成疰氣諸酒漿臨上不見影者殺人經宿葵食之發五種瘤癖疾葵和鯉魚鮓食之害人芥和兔肉同食成惡疾白苣和酩同食成寸白蟲生葱和蜜同食害人生葱與鷄子雉肉同食兼白大肉作癲邪疾發癥癖韭和牛肉食發瘦疾野苣勿與蜜同食作痔疾槿花不宜多食發痰饒睡凡果子生食多發宿疾李子與蜜同食和水多成痰桃食了入水成淋疾諸生果子停多日食之皆發宿疾苽入水沉者不可食成外癖疾夫攝生之事忌食父母及己身本命之物令人壽不永也諸肉自死者不可食損害人生肉與牛乳同食成苗蟲驢馬肉與猪肉同食發霍亂諸藏及胴如水洗之狀不染塵土有大毒不可食馬肉共蒼耳倉米同食害人羊肉與生鱠及酪同食皆有所傷害諸飲食上有游蜂停住者皆有毒勿食之諸色肉不得用桑柘枝剗食之成惡蟲病羊肝不得入生椒同食破人心肝猪肝不得與鱠同食作癰疽兔肉與生薑同食作霍亂猪牛肉共酪同食作氣癖鷄肉與鱉同食害人壬子日忌殺一切黑色生命物丙午日不得食鷄等肉慮被火燒厄庚申甲子日宜齋戒心祭祀鬼神餘物不得食若諸色肉煮炙赤色不變者皆害人新熱疾差忌食一切肉但疾病未平復忌食煮韭等自按摩法以手左拓右拓上拓下拓前拓後拓瞋目叩齒摩手熱摩眼拔耳捩腰震動雙作隻作反手爲之然復掣足仰展覆展都數約至七八十而止徐徐作之仍想空中太和氣漸下入頂如雲入山入皮入肉入腹入四肢五臟皆受其潤則覺腹中有聲意專存思勿念外縁則元氣達於氣海須臾自達於涌泉但日引一通至三通令人力健耳目聰明百疾皆去無限年月長存不忘得滿千萬通去仙不遠矣四氣攝生圖
