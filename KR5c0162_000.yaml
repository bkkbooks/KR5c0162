front:
  text: 四氣攝生圖序競三夫理國者以養人爲本修身者以治病爲先覆載之間唯人爲貴是以洪範五福其一曰壽皇天猶以爲景福之最人因元氣假以成形受氣陰陽皆禀天地江河淮濟五嶽九州草木星辰觸象比類皆神明所居各有所主存之即有廢之即無存之即生廢之即死黄庭云口爲天關精神機足爲地關生命扉手爲人關把盛衰天地含靈皆在人之掌握身貴若此命豈輕哉又氣訣云我命在我不在於天昧用者夭善用者延又云精極乃明神極乃靈氣極乃清元極乃冥因氣而衰因氣而榮因氣而滅因氣而生未有有氣而無形者未有有形而無氣者形氣相須全在修養老子云玄牝之門天地之根綿綿若存用之不勤人之口鼻皆神明出入之户牖也神所依者形形所依者氣氣所依者血血氣相隨如魚在水水濁魚疲氣擁則病生是知氣欲得清血欲得運運息流轉寢食順時五藏恬和疾從何起若一藏乖攝三焦受邪元氣不榮衆疾俱作仲尼云寢食不時嗜慾不節勞逸過度病共殺之且春風東來草木甲拆而積廩之粟不萌秋天雨霜草木零落而覆蓋之草木不傷草木性猶如此何况人之五藏六府豈不由修養耶世人罔能修行相次殂謝以殂謝爲命盡以疴痼爲筋衰謂天地之合然不信長生之可保天養人以五氣地養人以五味飲五氣者歸天食五味者歸地所謂百病橫生多因飲食飲食之患過於聲色聲色可以絶之逾年飲食不可廢之一日爲益不少爲患亦多如水浮舟亦能覆舟四時攝生蓋由節减保生銘云酸味損於筋辛多傷正氣甘物不益肉苦多傷其志醎多促人壽不得偏眈嗜思慮損人性喜怒傷於神性損即害生神傷則侵命養性以全氣保神以安心若役慮勞神竭心殉物體疲於外精喪於中衆邪競生安得延駐神隨氣氣依味味順即元氣清元氣清則神爽神爽則無疾是以體欲常勞食欲常少勞勿過極少勿太虚凡春分後夏至前少食糖酪之物生鱠相妨夏至後秋分前少食餅臛之物與瓜相妨當時不必病生却後終作諸暴斯乃從本者也重衣厚褥體不堪虚以致風寒之疾美麗艶姬以致虚損之形品味醉飽厭飫强餐以致疝結之疾養性之道勿久行久坐久聽久視不强食不强飲憂思愁衰飢餐渴飲日夕所營不住爲妙故曰流水不腐户樞不蠹以其動而不息也閑欲導引即不必鸞飛鳳舉猴擲虎蹲但展四肢動揺九竅令其血脉流轉上下宣通眞氣銘曰凡欲去疾導引爲先經脉不擁關節不煩或如射雕側身彎環或曲腰脊如蟾半圓交指腦後左旋右旋徑展手足氣出指端擺掣四肢捉搦三關熱摩赤澤氣海亦然是以攝養有方則壽同龜鶴若恣情放逸則命比蜉蝣因幼慕道門棲心澹薄究黄庭之妙㫖窮五千之玄言今則採掇方書搜羅秘訣四季避忌一年修行録之座隅日可觀覽號爲四季攝生圖云爾四季攝生圖
